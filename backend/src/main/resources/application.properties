spring.application.name=report-generator

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/reportdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Report file storage
report.output-dir=src/main/resources/reports

# Thread Pool for PDF generation
report.thread-pool.core-size=3
report.thread-pool.max-size=5
report.thread-pool.queue-capacity=25

# CORS
spring.web.cors.allowed-origins=http://localhost:5173
